; ============================================================================
; ooshutup10.cfg — PLACEHOLDER
; ============================================================================
;
; This file is a placeholder. Replace it with a real O&O ShutUp10++ config
; that you generate yourself (so you've consciously seen and approved every
; toggle).
;
; HOW TO GENERATE:
;   1. Download OOSU10.exe from https://www.oo-software.com/en/shutup10
;   2. Run as administrator
;   3. Either:
;        a) Actions menu > "Apply only recommended settings" (safe baseline), or
;        b) Walk through each setting yourself
;   4. File menu > Export settings...
;   5. Save the resulting .cfg as 'ooshutup10.cfg' in this directory,
;      overwriting THIS file.
;
; The bootstrap.ps1 script will then call:
;     OOSU10.exe ooshutup10.cfg /quiet
; on every run, re-applying your saved settings (useful after Windows feature
; updates which re-enable many of them).
;
; Until you generate one, the OOSU step will be skipped (logged as WARN).
; ============================================================================
